version: "3.7"

services:
  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - 5432
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: windmill
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  windmill_server:
    image: ${WM_IMAGE}:${WM_VERSION}
    labels:
      dev.windmill.role: server
    restart: unless-stopped
    expose:
      - 8000
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=postgres://postgres:changeme@db/windmill?sslmode=disable
      - MODE=server
      - LISTEN_NEW_EVENTS_INTERVAL_SEC=1
      - LICENSE_KEY=${LICENSE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  windmill_worker:
    image: ${WM_IMAGE}:${WM_VERSION}
    labels:
      dev.windmill.role: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:changeme@db/windmill?sslmode=disable
      - MODE=worker
      - WORKER_GROUP=default
      - LISTEN_NEW_EVENTS_INTERVAL_SEC=1
      - LICENSE_KEY=${LICENSE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      windmill_server:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_dependency_cache:/tmp/windmill/cache

  gitea:
    image: gitea/gitea:1.22-rootless
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://gitea:3000
      - GITEA__service__DISABLE_REGISTRATION=false
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data: null
  worker_dependency_cache: null
