name: Publish typescript-client & CLI to NPM on release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish_typescript_client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - run: cd typescript-client && ./publish.sh --provenance --access public && cd ..
  publish_cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: cd cli && ./build.sh && cd npm && npm publish --provenance --access public
