          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties: &ref_280
                    name:
                      type: string
                    owners:
                      type: array
                      items:
                        type: string
                    extra_perms:
                      type: object
                      additionalProperties:
                        type: boolean
                    summary:
                      type: string
                    created_by:
                      type: string
                    edited_at:
                      type: string
                      format: date-time
                    default_permissioned_as:
                      description: >
                        Ordered list of rules applied at create-time when admins
                        or `wm_deployers` members deploy items in this folder.
                        The first rule whose `path_glob` matches the item path
                        (relative to the folder root) wins, and its
                        `permissioned_as` is used as the default.
                      type: array
                      items: &ref_279
                        type: object
                        required:
                          - path_glob
                          - permissioned_as
                        properties:
                          path_glob:
                            type: string
                            description: >
                              Glob pattern evaluated against the item path
                              *relative* to the folder root (e.g. "jobs/**"
                              matches every item whose full path is
                              `f/<folder>/jobs/...`). Supports `*`, `**`, `?`,
                              `[abc]`, `{a,b}`.
                          permissioned_as:
                            type: string
                            description: >
                              Target identity the matched item should be
                              permissioned as. Must be `u/<username>`,
                              `g/<groupname>`, or an email that exists in this
                              workspace.
                  required: &ref_281
                    - name
                    - owners
                    - extra_perms
