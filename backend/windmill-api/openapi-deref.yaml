  /w/{workspace}/jobs/list_filtered_uuids:
    get:
      summary: get the ids of all jobs matching the given filters
      operationId: listFilteredJobsUuids
      tags:
        - job
      parameters:
        - name: workspace
          in: path
          required: true
          schema: *ref_4
        - name: created_by
          description: >-
            filter by exact matching user creator. Supports comma-separated list
            (e.g. 'alice,bob') and negation by prefixing all values with '!'
            (e.g. '!alice,!bob')
          in: query
          schema: *ref_119
        - name: label
          description: >-
            filter by exact matching job label. Supports comma-separated list
            (e.g. 'deploy,release') and negation by prefixing all values with
            '!' (e.g. '!deploy,!release')
          in: query
          schema: &ref_173
            type: string
        - name: worker
          description: >-
            filter by worker this job ran on. Supports comma-separated list
            (e.g. 'worker-1,worker-2') and negation by prefixing all values with
            '!' (e.g. '!worker-1,!worker-2')
          in: query
          schema: *ref_155
        - name: parent_job
          description: >-
            The parent job that is at the origin and responsible for the
            execution of this script if any
          in: query
          schema: *ref_110
        - name: script_path_exact
          description: >-
            filter by exact matching script path. Supports comma-separated list
            (e.g. 'f/script1,f/script2') and negation by prefixing all values
            with '!' (e.g. '!f/script1,!f/script2')
          in: query
          schema: *ref_156
        - name: script_path_start
          description: >-
            filter by script path prefix. Supports comma-separated list (e.g.
            'f/folder1,f/folder2') and negation by prefixing all values with '!'
            (e.g. '!f/folder1,!f/folder2')
          in: query
          schema: *ref_157
        - name: schedule_path
          description: mask to filter by schedule path
          in: query
          schema: *ref_158
        - name: script_hash
          description: mask to filter exact matching path
          in: query
          schema: *ref_159
        - name: started_before
          description: filter on started before (inclusive) timestamp
          in: query
          schema: *ref_160
        - name: started_after
          description: filter on started after (exclusive) timestamp
          in: query
          schema: *ref_161
        - name: created_before
          description: filter on created before (inclusive) timestamp
          in: query
          schema: &ref_181
            type: string
            format: date-time
        - name: created_after
          description: filter on created after (exclusive) timestamp
          in: query
          schema: &ref_182
            type: string
            format: date-time
        - name: completed_before
          description: filter on started before (inclusive) timestamp
          in: query
          schema: &ref_183
            type: string
            format: date-time
        - name: completed_after
          description: filter on started after (exclusive) timestamp
          in: query
          schema: &ref_184
            type: string
            format: date-time
        - name: created_before_queue
          description: filter on jobs created before X for jobs in the queue only
          in: query
          schema: &ref_185
            type: string
            format: date-time
        - name: created_after_queue
          description: filter on jobs created after X for jobs in the queue only
          in: query
          schema: &ref_186
            type: string
            format: date-time
        - name: running
          description: filter on running jobs
          in: query
          schema: *ref_162
        - name: scheduled_for_before_now
          description: filter on jobs scheduled_for before now (hence waitinf for a worker)
          in: query
          schema: *ref_163
        - name: job_kinds
          description: >-
            filter by job kind. Supports comma-separated list of values
            ('preview', 'script', 'dependencies', 'flow') and negation by
            prefixing all values with '!' (e.g. '!preview,!dependencies')
          in: query
          schema: *ref_164
        - name: suspended
          description: filter on suspended jobs
          in: query
          schema: *ref_165
        - name: args
          description: >-
            filter on jobs containing those args as a json subset (@> in
            postgres)
          in: query
          schema: *ref_166
        - name: tag
          description: >-
            filter by tag/worker group. Supports comma-separated list (e.g.
            'gpu,highmem') and negation by prefixing all values with '!' (e.g.
            '!gpu,!highmem')
          in: query
          schema: *ref_167
        - name: result
          description: >-
            filter on jobs containing those result as a json subset (@> in
            postgres)
          in: query
          schema: *ref_168
        - name: page
          description: which page to return (start at 1, default 1)
          in: query
          schema: *ref_17
        - name: per_page
          description: number of items to return for a given page (default 30, max 100)
          in: query
          schema: *ref_18
        - name: is_skipped
          description: is the job skipped
          in: query
          schema:
            type: boolean
        - name: is_flow_step
          description: is the job a flow step
          in: query
          schema:
            type: boolean
        - name: has_null_parent
          description: has null parent
          in: query
          schema:
            type: boolean
        - name: success
          description: filter on successful jobs
          in: query
          schema:
            type: boolean
        - name: all_workspaces
          description: >-
            get jobs from all workspaces (only valid if request come from the
            `admins` workspace)
          in: query
          schema:
            type: boolean
        - name: is_not_schedule
          description: is not a scheduled job
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: uuids of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
