          description: >-
            filter by script path prefix. Supports comma-separated list (e.g.
            'f/folder1,f/folder2') and negation by prefixing all values with '!'
            (e.g. '!f/folder1,!f/folder2')
          in: query
          schema: *ref_157
        - name: schedule_path
          description: mask to filter by schedule path
          in: query
          schema: *ref_158
        - name: script_hash
          description: mask to filter exact matching path
          in: query
          schema: *ref_159
        - name: started_before
          description: filter on started before (inclusive) timestamp
          in: query
          schema: *ref_160
        - name: started_after
          description: filter on started after (exclusive) timestamp
          in: query
          schema: *ref_161
        - name: running
          description: filter on running jobs
          in: query
          schema: *ref_162
        - name: scheduled_for_before_now
          description: filter on jobs scheduled_for before now (hence waitinf for a worker)
          in: query
          schema: *ref_163
        - name: completed_before
          description: filter on started before (inclusive) timestamp
          in: query
          schema: *ref_183
        - name: completed_after
          description: filter on started after (exclusive) timestamp
          in: query
          schema: *ref_184
        - name: created_before_queue
          description: filter on jobs created before X for jobs in the queue only
          in: query
          schema: *ref_185
        - name: created_after_queue
          description: filter on jobs created after X for jobs in the queue only
          in: query
          schema: *ref_186
        - name: job_kinds
          description: >-
            filter by job kind. Supports comma-separated list of values
            ('preview', 'script', 'dependencies', 'flow') and negation by
            prefixing all values with '!' (e.g. '!preview,!dependencies')
          in: query
          schema: *ref_164
        - name: args
          description: >-
            filter on jobs containing those args as a json subset (@> in
            postgres)
          in: query
          schema: *ref_166
        - name: tag
          description: >-
            filter by tag/worker group. Supports comma-separated list (e.g.
            'gpu,highmem') and negation by prefixing all values with '!' (e.g.
            '!gpu,!highmem')
          in: query
          schema: *ref_167
        - name: result
          description: >-
            filter on jobs containing those result as a json subset (@> in
            postgres)
          in: query
          schema: *ref_168
        - name: allow_wildcards
          description: allow wildcards (*) in the filter of label, tag, worker
          in: query
          schema: *ref_170
        - name: page
          description: which page to return (start at 1, default 1)
          in: query
          schema: *ref_17
        - name: per_page
          description: number of items to return for a given page (default 30, max 100)
          in: query
          schema: *ref_18
        - name: trigger_kind
          description: >-
            filter by trigger kind. Supports comma-separated list (e.g.
            'schedule,webhook') and negation by prefixing all values with '!'
            (e.g. '!schedule,!webhook')
          in: query
          x-go-name: JobTriggerKindParam
          schema: *ref_187
        - name: is_skipped
          description: is the job skipped
          in: query
          schema:
            type: boolean
        - name: is_flow_step
          description: is the job a flow step
          in: query
          schema:
            type: boolean
        - name: has_null_parent
          description: has null parent
          in: query
          schema:
            type: boolean
        - name: success
          description: filter on successful jobs
          in: query
          schema:
            type: boolean
        - name: all_workspaces
          description: >-
            get jobs from all workspaces (only valid if request come from the
            `admins` workspace)
          in: query
          schema:
            type: boolean
        - name: is_not_schedule
          description: is not a scheduled job
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: time
          content:
            application/json:
              schema:
                type: object
                properties: &ref_539
                  jobs:
                    type: array
                    items:
                      oneOf: *ref_192
                      discriminator: *ref_193
                  obscured_jobs:
                    type: array
                    items:
                      type: object
                      properties: &ref_392
                        typ:
                          type: string
                        started_at:
                          type: string
                          format: date-time
                        duration_ms:
                          type: number
                  omitted_obscured_jobs:
                    description: >-
                      Obscured jobs omitted for security because of too specific
                      filtering
                    type: boolean
                required: &ref_540
                  - jobs
                  - obscured_jobs
