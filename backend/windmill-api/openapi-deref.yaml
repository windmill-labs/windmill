  /w/{workspace}/assets/list:
    get:
      summary: List all assets in the workspace with cursor pagination
      operationId: listAssets
      tags:
        - asset
      parameters:
        - name: workspace
          in: path
          required: true
          schema: *ref_4
        - name: per_page
          in: query
          description: Number of items per page (max 1000, default 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
        - name: cursor_created_at
          in: query
          description: >-
            Cursor timestamp for pagination (created_at of last item from
            previous page)
          schema:
            type: string
            format: date-time
        - name: cursor_id
          in: query
          description: Cursor ID for pagination (id of last item from previous page)
          schema:
            type: integer
            format: int64
        - name: asset_path
          in: query
          description: Filter by asset path (case-insensitive partial match)
          schema:
            type: string
        - name: usage_path
          in: query
          description: Filter by usage path (case-insensitive partial match)
          schema:
            type: string
        - name: asset_kinds
          in: query
          description: Filter by asset kinds (multiple values allowed)
          schema:
            type: string
        - name: path
          in: query
          description: exact path match filter
          schema:
            type: string
        - name: columns
          in: query
          description: JSONB subset match filter for columns using base64 encoded JSON
          schema:
            type: string
        - name: broad_filter
          description: >-
            broad search across multiple fields (case-insensitive substring
            match)
          in: query
          schema:
            type: string
      responses:
        '200':
          description: paginated assets in the workspace
          content:
            application/json:
              schema:
                type: object
                required:
                  - assets
                properties:
                  assets:
                    type: array
                    items:
                      type: object
                      required:
                        - path
                        - kind
                        - usages
                      properties:
                        path:
                          type: string
                        kind:
                          type: string
                          enum: *ref_300
                        usages:
                          type: array
                          items:
                            type: object
                            required:
                              - path
                              - kind
                            properties:
                              path:
                                type: string
                              kind:
                                type: string
                                enum: &ref_302
                                  - script
                                  - flow
                                  - job
                              access_type:
                                type: string
                                enum: &ref_301
                                  - r
                                  - w
                                  - rw
                                nullable: true
                              columns:
                                type: object
                                description: The columns used (for tables)
                                additionalProperties:
                                  type: string
                                  enum: *ref_301
                                  nullable: true
                              created_at:
                                type: string
                                format: date-time
                                description: When the asset was detected
                              metadata:
                                type: object
                                properties:
                                  runnable_path:
                                    type: string
                                    description: >-
                                      The path of the script/flow that was run
                                      (only present when kind is 'job')
                                  job_kind:
                                    type: string
                                    description: >-
                                      The kind of job (script, flow, preview,
                                      etc.) (only present when kind is 'job')
                        metadata:
                          type: object
                          properties:
                            resource_type:
                              type: string
                              description: >-
                                The type of the resource (only present when kind
                                is 'resource')
                  next_cursor:
                    type: object
                    description: Cursor for the next page (null if no more pages)
                    nullable: true
                    properties:
                      created_at:
                        type: string
                        format: date-time
                        description: Timestamp to use for next page
                      id:
                        type: integer
                        format: int64
                        description: ID to use for next page
