                    - path
                    - value
  /w/{workspace}/flows/list:
    get:
      summary: list all flows
      operationId: listFlows
      x-mcp-tool: true
      tags:
        - flow
      parameters:
        - name: workspace
          in: path
          required: true
          schema: *ref_4
        - name: page
          description: which page to return (start at 1, default 1)
          in: query
          schema: *ref_17
        - name: per_page
          description: number of items to return for a given page (default 30, max 100)
          in: query
          schema: *ref_18
        - name: order_desc
          description: order by desc order (default true)
          in: query
          schema: *ref_118
        - name: created_by
          description: >-
            filter by exact matching user creator. Supports comma-separated list
            (e.g. 'alice,bob') and negation by prefixing all values with '!'
            (e.g. '!alice,!bob')
          in: query
          schema: *ref_119
        - name: path_start
          description: mask to filter matching starting path
          in: query
          schema:
            type: string
        - name: path_exact
          description: mask to filter exact matching path
          in: query
          schema:
            type: string
        - name: show_archived
          description: >
            (default false)

            show only the archived files.

            when multiple archived hash share the same path, only the ones with
            the latest create_at

            are displayed.
          in: query
          schema:
            type: boolean
        - name: starred_only
          description: |
            (default false)
            show only the starred items
          in: query
          schema:
            type: boolean
        - name: include_draft_only
          description: |
            (default false)
            include items that have no deployed version
          in: query
          schema:
            type: boolean
        - name: with_deployment_msg
          description: |
            (default false)
            include deployment message
          in: query
          schema:
            type: boolean
        - name: without_description
          in: query
          description: |
            (default false)
            If true, the description field will be omitted from the response.
          schema:
            type: boolean
        - name: dedicated_worker
          in: query
          description: |
            (default regardless)
            If true, show only flows with dedicated_worker enabled.
            If false, show only flows with dedicated_worker disabled.
          schema:
            type: boolean
        - name: label
          in: query
          required: false
          schema:
            type: string
          description: Filter by label
      responses:
        '200':
          description: All flow
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - allOf: &ref_124
                        - type: object
                          description: >-
                            Top-level flow definition containing metadata,
                            configuration, and the flow structure
                          properties: *ref_120
                          required: *ref_121
                        - type: object
                          properties: &ref_511
                            workspace_id:
                              type: string
                            path:
                              type: string
                            edited_by:
                              type: string
                            edited_at:
                              type: string
                              format: date-time
                            archived:
                              type: boolean
                            extra_perms:
                              type: object
                              additionalProperties: &ref_510
                                type: boolean
                            starred:
                              type: boolean
                            draft_only:
                              type: boolean
                            tag:
                              type: string
                            ws_error_handler_muted:
                              type: boolean
