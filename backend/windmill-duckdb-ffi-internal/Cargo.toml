[workspace]

[package]
name = "windmill_duckdb_ffi_internal"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.41"
duckdb = { version = "1.10502.0", features = ["bundled"] }
regex = "1"
rust_decimal = "1.37.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "^1", features = ["preserve_order", "raw_value"] }

[dev-dependencies]
tempfile = "3"

# cdylib: the artifact loaded dynamically by the worker via libloading (must
# stay dynamic — see README_DEV.md). rlib: lets `cargo test` build the unit
# test harness; it is an extra artifact and does not change how the worker
# loads the library.
[lib]
crate-type = ["cdylib", "rlib"]
