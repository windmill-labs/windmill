name: "r install"

mode: ONCE
hostname: "r"
log_level: ERROR
time_limit: 900

disable_rl: true

envar: "HOME=/tmp"
envar: "R_INSTALL_TAR=/usr/bin/tar --no-same-owner"

cwd: "/tmp"

clone_newnet: false
clone_newuser: {CLONE_NEWUSER}

skip_setsid: true
keep_caps: true
keep_env: true
mount_proc: true


mount {
    src: "/bin"
    dst: "/bin"
	is_bind: true
    mandatory: false
}

mount {
    src: "/lib"
    dst: "/lib"
	is_bind: true
    mandatory: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
	is_bind: true
    mandatory: false
}

mount {
    src: "/usr"
    dst: "/usr"
	is_bind: true
    mandatory: false
}

mount {
    src: "/etc"
    dst: "/etc"
	is_bind: true
}

# Shadow kubelet-injected /etc submounts with read-only file binds. The /etc
# bind above is read-only, but on Kubernetes /etc/hosts, /etc/resolv.conf and
# /etc/hostname are separate bind-mounts layered on /etc, and nsjail's
# read-only remount is non-recursive, leaving them writable (cross-tenant DNS
# poisoning). Load-bearing despite the /etc bind above -- do not remove.
mount {
    src: "/etc/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    mandatory: false
}

mount {
    src: "/etc/hosts"
    dst: "/etc/hosts"
    is_bind: true
    mandatory: false
}

mount {
    src: "/etc/hostname"
    dst: "/etc/hostname"
    is_bind: true
    mandatory: false
}

mount {
	src: "/dev/null"
	dst: "/dev/null"
	is_bind: true
	rw: true
}

mount {
    src: "{JOB_DIR}"
    dst: "/tmp"
    is_bind: true
    mandatory: false
    rw: true
}

mount {
    src: "{PKG_DIR}"
    dst: "/install"
    is_bind: true
    rw: true
}

mount {
    src: "/sys/devices/system/cpu"
    dst: "/sys/devices/system/cpu"
    is_bind: true
    mandatory: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
}

mount {
    src: "{TRACING_PROXY_CA_CERT_PATH}"
    dst: "{TRACING_PROXY_CA_CERT_PATH}"
    is_bind: true
    mandatory: false
}

#{DEV}
