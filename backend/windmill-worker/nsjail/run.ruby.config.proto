name: "ruby run script"

mode: ONCE
hostname: "ruby"
log_level: ERROR
time_limit: {TIMEOUT}

disable_rl: true

cwd: "/tmp"

clone_newnet: false
clone_newuser: {CLONE_NEWUSER}

skip_setsid: true
keep_caps: false
keep_env: true
# mount_proc: true

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
}


mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    mandatory: false
}


mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
}

mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=500000000"
}


mount {
    src: "{JOB_DIR}/main.rb"
    dst: "/tmp/main.rb"
    is_bind: true
    mandatory: false
}

mount {
    src: "{JOB_DIR}/args.json"
    dst: "/tmp/args.json"
    is_bind: true
}

mount {
    src: "{JOB_DIR}/result.json"
    dst: "/tmp/result.json"
    rw: true
    is_bind: true
}

#mount {
#    src: "{CACHE_DIR}"
#    dst: "{CACHE_DIR}"
#    is_bind: true
#    mandatory: false
# }

mount {
    src: "/etc"
    dst: "/etc"
    is_bind: true
}

# Shadow kubelet-injected /etc submounts with read-only file binds. The /etc
# bind above is read-only, but on Kubernetes /etc/hosts, /etc/resolv.conf and
# /etc/hostname are separate bind-mounts layered on /etc, and nsjail's
# read-only remount is non-recursive, leaving them writable (cross-tenant DNS
# poisoning). Load-bearing despite the /etc bind above -- do not remove.
mount {
    src: "/etc/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    mandatory: false
}

mount {
    src: "/etc/hosts"
    dst: "/etc/hosts"
    is_bind: true
    mandatory: false
}

mount {
    src: "/etc/hostname"
    dst: "/etc/hostname"
    is_bind: true
    mandatory: false
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
}

iface_no_lo: true

{SHARED_MOUNT}

{SHARED_DEPENDENCIES}

mount {
    src: "{TRACING_PROXY_CA_CERT_PATH}"
    dst: "{TRACING_PROXY_CA_CERT_PATH}"
    is_bind: true
    mandatory: false
}

#{DEV}
