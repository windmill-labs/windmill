name: "windmill sandbox"

mode: LISTEN
hostname: "sandbox"
log_level: ERROR

disable_rl: true

cwd: "/workspace"

clone_newnet: {CLONE_NEWNET}
clone_newuser: {CLONE_NEWUSER}

skip_setsid: true
keep_caps: false
keep_env: true
mount_proc: true

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
}

mount {
    src: "/proc/self/fd"
    dst: "/dev/fd"
    is_symlink: true
    mandatory: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    mandatory: false
}

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
}

mount {
    src: "/etc"
    dst: "/etc"
    is_bind: true
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
}

mount {
    src: "{SANDBOX_DIR}"
    dst: "/workspace"
    is_bind: true
    rw: true
}

mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size={DISK_LIMIT}"
}

iface_no_lo: {IFACE_NO_LO}

cgroup_mem_max: {MEMORY_LIMIT}
cgroup_cpu_ms_per_sec: {CPU_MS_PER_SEC}

{EXTRA_MOUNTS}
