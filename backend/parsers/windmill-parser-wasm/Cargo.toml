# NOTE: This crate is standalone (not in workspace members) because
# `cargo-features = ["panic-immediate-abort"]` requires nightly and breaks `cargo metadata`
# on stable Rust.
# TODO: Add to workspace members once panic-immediate-abort is stable
cargo-features = ["panic-immediate-abort"]

[workspace]

[package]
name = "windmill-parser-wasm"
version = "1.639.0"
edition = "2021"
authors = ["Ruben Fiszel <ruben@windmill.dev>"]

[lib]
crate-type = ["cdylib"]
name = "windmill_parser_wasm"
path = "./src/lib.rs"

[dev-dependencies]
wasm-bindgen-test = "0.3"
windmill-parser-ts = { path = "../windmill-parser-ts" }
windmill-parser-bash = { path = "../windmill-parser-bash" }

[profile.release]
panic = "immediate-abort"

[unstable]
build-std = ["std", "panic_abort"]


[features]
default = []
go-parser = [ "dep:windmill-parser-go"]
bash-parser = [ "dep:windmill-parser-bash"]
sql-parser = [ "dep:windmill-parser-sql"]
py-parser = [ "dep:windmill-parser-py"]
ts-parser = [ "dep:windmill-parser-ts"]
php-parser = [ "dep:windmill-parser-php"]
rust-parser = [ "dep:windmill-parser-rust"]
graphql-parser = [ "dep:windmill-parser-graphql"]
ansible-parser = [ "dep:windmill-parser-yaml"]
csharp-parser = [ "dep:windmill-parser-csharp"]
nu-parser = [ "dep:windmill-parser-nu"]
java-parser = [ "dep:windmill-parser-java"]
ruby-parser = [ "dep:windmill-parser-ruby"]

[dependencies]
anyhow = "1"
windmill-parser = { path = "../windmill-parser" }
windmill-parser-go = { path = "../windmill-parser-go", optional = true }
windmill-parser-bash = { path = "../windmill-parser-bash", optional = true }
windmill-parser-sql = { path = "../windmill-parser-sql", optional = true }
windmill-parser-py = { path = "../windmill-parser-py", optional = true }
windmill-parser-ts = { path = "../windmill-parser-ts", optional = true }
windmill-parser-php = { path = "../windmill-parser-php", optional = true }
windmill-parser-graphql = { path = "../windmill-parser-graphql", optional = true }
windmill-parser-rust = { path = "../windmill-parser-rust", optional = true }
windmill-parser-yaml = { path = "../windmill-parser-yaml", optional = true }
windmill-parser-csharp = { path = "../windmill-parser-csharp", optional = true }
windmill-parser-nu = { path = "../windmill-parser-nu", optional = true }
windmill-parser-java = { path = "../windmill-parser-java", optional = true }
windmill-parser-ruby = { path = "../windmill-parser-ruby", optional = true }
wasm-bindgen = "0.2"

serde_json = "1"
getrandom = { version = "0.2", features = ["js"] }
