description: >
  1. Open up `Profile Settings` by clicking on the profile picture icon at the
  top-right corner

  2. Copy the API key and the base URL
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    apiKey:
      type: string
      description: API key for the user with required permission level
    baseUrl:
      type: string
      description: Base URL of the support portal
  required:
    - apiKey
    - baseUrl
