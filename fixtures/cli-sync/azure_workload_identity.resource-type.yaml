description: |
  Azure Blob Storage configuration which works with Azure Workload Identity.

  Assume the servers and workers are passed the following env variable:
  AZURE_FEDERATED_TOKEN_FILE
  AZURE_CLIENT_ID
  AZURE_TENANT_ID
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - accountName
    - containerName
    - useSSL
  properties:
    accountName:
      type: string
      description: ''
      default: ''
    containerName:
      type: string
      description: ''
      default: ''
    useSSL:
      type: boolean
      description: ''
      default: true
  required:
    - accountName
    - containerName
    - useSSL
