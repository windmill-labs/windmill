description: The connection credentials for oracledb
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - user
    - password
    - database
  properties:
    database:
      type: string
      description: The database connection string
      default: ''
      nullable: false
      placeholder: server_name:1521/db_name
    password:
      type: string
      description: The pasword for the user
      default: ''
      nullable: false
      password: true
    user:
      type: string
      description: The database username
      default: ''
      nullable: false
  required:
    - password
    - database
    - user
