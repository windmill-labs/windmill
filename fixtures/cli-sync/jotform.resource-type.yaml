description: >-
  1. Head to `settings` by clicking the avatar on the top-right corner.

  2. Select `API` from the navigation bar on the left, and create a new key.

  3. Copy the generated API key.

  5. Visit [this](https://api.jotform.com/docs/#overview) URL to review the API
  endpoints available.

  6. Copy the API endpoint for your relevant region.
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    apiKey:
      type: string
      description: API Key generated from the dashboard.
    baseUrl:
      type: string
      description: Base URL of the API to use - US, EU, HIPAA, or custom domain
  required:
    - apiKey
    - baseUrl
