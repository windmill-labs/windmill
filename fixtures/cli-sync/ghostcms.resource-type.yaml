description: >-
  1. On the blog dashboard open up `Settings` -> `Integrations`

  2. Press the `Add Custom Integration` button, provide a unique name, and add
  the integration

  3. Copy the `Admin API Key` and the `API URL`
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    apiKey:
      type: string
      description: Admin API Key for Ghost CMS.
    apiUrl:
      type: string
      description: Base URL of the Blog and the API.
  required:
    - apiKey
    - apiUrl
