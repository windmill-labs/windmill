summary: Seed all km_real datasets from nil (raw->enriched->summary->report) for
  e2e runs
description: 'Manual reset entrypoint: regenerates
  raw_events/enriched/summary/report.json with the same transforms as the
  pipeline steps so the f/km pipeline can run end-to-end on a clean object
  store.'
lock: '!inline f/km/r_seed.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - count
  properties:
    count:
      type: integer
      description: Number of raw events to generate
      default: 100
  required: []
