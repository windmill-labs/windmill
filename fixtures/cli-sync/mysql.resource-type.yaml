description: ''
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - host
    - port
    - user
    - database
    - password
    - ssl
    - root_certificate_pem
  properties:
    database:
      type: string
      description: database name
      default: ''
    host:
      type: string
      description: instance host
      default: ''
    password:
      type: string
      description: user's password
      default: ''
    port:
      type: number
      description: instance port
      default: 3306
    root_certificate_pem:
      type: string
      description: ''
      default: ''
    ssl:
      type: boolean
      description: use ssl
      default: false
    user:
      type: string
      description: username
      default: ''
  required:
    - user
    - database
    - password
