description: SensorTower offers insights into mobile applications, and also
  accessible through an API.
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - base_url
    - auth_token
  properties:
    auth_token:
      type: string
      description: API authentication token
      default: ''
      password: true
    base_url:
      type: string
      description: Endpoint of the API server
      default: https://api.sensortower.com
      nullable: false
  required:
    - base_url
