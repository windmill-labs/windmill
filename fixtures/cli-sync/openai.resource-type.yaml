description: Resource for authentication to the OpenAI API
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - api_key
    - organization_id
    - base_url
  properties:
    api_key:
      type: string
      description: ''
      default: ''
    base_url:
      type: string
      description: Optional. Only needed to overwrite the default base URL.
      default: ''
    organization_id:
      type: string
      description: Only needs to be set for users who belong to multiple organizations
        and they want to use an organization other than the default one
      default: ''
  required:
    - api_key
