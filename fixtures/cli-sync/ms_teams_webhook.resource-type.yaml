description: This resource type connects to an individual Microsoft Teams
  Channels via a webhook
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    webhook_url:
      type: string
      description: See
        https://learn.microsoft.com/en-us/microsoftteams/platform/webhooks-and-connectors/how-to/add-incoming-webhook?tabs=dotnet
        for detais on how to create a webhook
      default: ''
  required:
    - webhook_url
