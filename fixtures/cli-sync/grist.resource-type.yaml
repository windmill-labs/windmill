description: Schema for the resource configuration
format_extension: null
is_fileset: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    apiKey:
      type: string
      description: API key retrieved from the profile settings.
    host:
      type: string
      description: Base URL of the API - for personal workspace, use docs.getgrist.com
        and for team workspace, use team URL.
  required:
    - '{property1}'
